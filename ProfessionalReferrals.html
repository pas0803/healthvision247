<section class="py-20 bg-slate-50">
    <div class="max-w-4xl mx-auto px-6 bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col md:flex-row">
        <div class="md:w-1/3 bg-teal-700 p-10 text-white">
            <h3 class="text-2xl font-bold mb-4">Professional Referrals</h3>
            <p class="text-teal-100 mb-6 text-sm leading-relaxed">We partner with GPs and Hospitals to ensure a seamless transition for patients requiring home-based clinical support.</p>
            <ul class="space-y-3 text-sm">
                <li class="flex items-center">✓ 2-Hour Response Time</li>
                <li class="flex items-center">✓ Clinical Oversight</li>
                <li class="flex items-center">✓ Family Coordination</li>
            </ul>
        </div>
        <div class="md:w-2/3 p-10">
            <form action="#" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Referrer Name</label>
                    <input type="text" class="w-full border-b-2 border-gray-200 focus:border-teal-600 outline-none py-2 text-sm" placeholder="Dr. Smith">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Facility/Clinic</label>
                    <input type="text" class="w-full border-b-2 border-gray-200 focus:border-teal-600 outline-none py-2 text-sm" placeholder="City Hospital">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Patient Needs</label>
                    <select class="w-full border-b-2 border-gray-200 focus:border-teal-600 outline-none py-2 text-sm bg-transparent">
                        <option>Wound Care / Nursing</option>
                        <option>Post-Operative Recovery</option>
                        <option>Palliative Care</option>
                        <option>Disability Support</option>
                    </select>
                </div>
                <div class="col-span-2 mt-4">
                    <button class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg hover:bg-teal-700 transition">Submit Referral</button>
                </div>
            </form>
        </div>
    </div>
</section>
